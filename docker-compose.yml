version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: servicehub_backend
    ports:
      - '4000:4000'
    environment:
      - PORT=4000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/servicehub
      - REDIS_URI=redis://redis:6379
      - JWT_ACCESS_SECRET=your_super_secret_access_token_key_here
      - JWT_REFRESH_SECRET=your_super_secret_refresh_token_key_here
      - SMTP_FROM="ServiceHub" <no-reply@servicehub.com>
    depends_on:
      - mongo
      - redis
    restart: always

  mongo:
    image: mongo:6.0
    container_name: servicehub_mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: always

  redis:
    image: redis:7-alpine
    container_name: servicehub_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: always

volumes:
  mongo_data:
  redis_data:
